kind = "web"
previewPath = "/"
title = "Sanjeevani Clinic"
version = "1.0.0"
id = "artifacts/sanjeevani-clinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23114

[services.development]
run = "pnpm --filter @workspace/sanjeevani-clinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sanjeevani-clinic", "run", "build" ]
publicDir = "artifacts/sanjeevani-clinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23114"
BASE_PATH = "/"
